<!DOCTYPE html>
<html>
<head>
<title>Support - ASKA</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:40px;
line-height:1.7;
background:#f8fafc;
}
input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
}
button{
padding:12px 24px;
}
</style>
</head>
<body>

<h1>ASKA Support</h1>

<p>
Need help? Contact us using the form below.
</p>

<form
action="https://formsubmit.co/support@useaska.com"
method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden"
name="_subject"
value="ASKA Support Request">

<input type="hidden"
name="_next"
value="https://useaska.com/support.html">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<textarea
name="message"
placeholder="Describe your issue"
required></textarea>

<button type="submit">
Submit Support Request
</button>

</form>

<p>
Email: support@useaska.com
<br>
Phone: +91 9620507296
</p>

</body>
</html>
